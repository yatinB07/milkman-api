services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: milkman_api
    restart: unless-stopped
    working_dir: /var/www/html
    network_mode: host
    volumes:
      - .:/var/www/html
      - api_vendor:/var/www/html/vendor
    command: >
      sh -lc "
        composer install --no-interaction --prefer-dist &&
        php artisan config:clear &&
        php artisan migrate --force &&
        php artisan serve --host=0.0.0.0 --port=8000
      "
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8000/api/v1/health') ? 0 : 1);\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  api_vendor:
